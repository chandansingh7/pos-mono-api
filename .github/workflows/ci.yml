name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME }}
          POSTGRES_USER: ${{ secrets.TEST_DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'corretto'
        cache: gradle

    - name: Build with Gradle
      run: ./gradlew clean build -x test

    - name: Run tests
      run: ./gradlew test
      env:
        DATABASE_URL: jdbc:postgresql://localhost:5432/${{ secrets.TEST_DB_NAME }}
        DATABASE_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
        DATABASE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: pos-api
        path: build/libs/cicdpos-1.0.0.jar
        retention-days: 7

  deploy-azure:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: pos-api
        path: release

    - name: Prepare clean deployment package
      run: |
        # Rename to a fixed filename so Azure always starts the same JAR
        mv release/cicdpos-1.0.0.jar release/app.jar

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: release/app.jar

    - name: Restart Azure Web App via Kudu API
      env:
        PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        APP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
      run: |
        # Parse publish profile with Python (reliable XML parsing, no regex issues)
        CREDS=$(python3 - <<'EOF'
import os, xml.etree.ElementTree as ET
profile = os.environ.get("PUBLISH_PROFILE", "")
try:
    root = ET.fromstring(profile)
    for pub in root.findall("publishProfile"):
        method = pub.get("publishMethod", "")
        if method == "MSDeploy" or method == "FTP":
            user = pub.get("userName", "")
            pwd  = pub.get("userPWD", "")
            if user and pwd:
                print(f"{user}:{pwd}")
                break
except Exception as e:
    print(f"PARSE_ERROR:{e}", end="")
EOF
        )
        if [[ "$CREDS" == PARSE_ERROR* ]] || [[ -z "$CREDS" ]]; then
          echo "Could not parse publish profile credentials — skipping restart (app will restart automatically after deploy)"
          exit 0
        fi
        HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          "https://${APP_NAME}.scm.azurewebsites.net/api/restart" \
          -u "$CREDS" --max-time 30)
        echo "Kudu restart HTTP status: $HTTP"
        if [[ "$HTTP" != "200" && "$HTTP" != "204" ]]; then
          echo "Warning: unexpected status $HTTP — app may need a manual restart in Azure Portal"
        fi
