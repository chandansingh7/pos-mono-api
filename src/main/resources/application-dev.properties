# ── Dev profile (local machine) ──────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cicdpos}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Swagger enabled in dev
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ─── Email (Proton Mail Bridge for local testing) ─────────────────────────────
# Install Proton Mail Bridge, sign in with your Proton account, enable SMTP.
# Then set in your environment (do not commit):
#   MAIL_USERNAME=your-proton@proton.me
#   MAIL_PASSWORD=<Bridge password or account password>
# Receipts are sent from the Company email (set in app Settings); use the same address as MAIL_USERNAME.
spring.mail.host=${MAIL_HOST:127.0.0.1}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}
